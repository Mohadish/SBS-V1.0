<!DOCTYPE html>
<!--
  Hidden TTS host window.
  ──────────────────────
  Lives in its own renderer process (nodeIntegration:false) so kokoro-js's
  *web* build resolves cleanly to onnxruntime-web with WebGPU. The Node-
  integrated path with require() pulled in onnxruntime-node's DirectML EP,
  which choked on Kokoro's ConvTranspose ops on every dtype.

  The preload (tts-host-preload.js) exposes IPC + config under window.ttsHost
  / window.ttsConfig. tts-host.js loads the bundled web build directly via
  ES module import — kokoro.web.js is a self-contained 2 MB bundle, so no
  import map gymnastics required.

  CSP allows file: + blob: + data: because we load model files locally and
  ORT's WebGPU runtime spins up workers from blob URLs. wasm-unsafe-eval is
  required by ORT's onnxruntime-web wasm shim.
-->
<html>
<head>
  <meta charset="utf-8" />
  <!-- connect-src includes https://huggingface.co/ ONLY because kokoro-js
       constructs HF URLs internally even when the file is local. We
       intercept those URLs in tts-host.js's fetch wrapper and redirect
       to file:// — they never actually reach the network. CSP allowing
       the host is harmless here; the interceptor short-circuits first. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file: blob: data: https://huggingface.co; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob: file:; connect-src 'self' file: blob: data: https://huggingface.co; worker-src 'self' blob:;" />
  <title>SBS TTS host</title>
</head>
<body>
  <div id="status">Loading Kokoro…</div>
  <script type="module" src="./tts-host.js"></script>
</body>
</html>
